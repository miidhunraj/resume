<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" shape-rendering="geometricPrecision">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&amp;family=Playfair+Display:ital,wght@1,900&amp;display=swap');
    </style>
    <!-- Top lime bar clip -->
    <clipPath id="roundclip">
      <rect x="0" y="0" width="400" height="400" rx="48" ry="48"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="400" height="400" rx="48" ry="48" fill="#0f0f0f"/>

  <!-- Scanlines texture -->
  <rect x="0" y="0" width="400" height="400" rx="48" ry="48" clip-path="url(#roundclip)"
    fill="url(#scan)" opacity="1"/>
  <defs>
    <pattern id="scan" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="2" fill="#000" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Outer ring -->
  <circle cx="200" cy="195" r="155" fill="none" stroke="#89E900" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Inner ring -->
  <circle cx="200" cy="195" r="118" fill="none" stroke="#89E900" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top lime accent bar -->
  <rect x="0" y="0" width="400" height="4" rx="2" fill="#89E900" clip-path="url(#roundclip)"/>

  <!-- Corner bracket — top left -->
  <path d="M28 52 L28 28 L52 28" fill="none" stroke="#89E900" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Corner bracket — top right -->
  <path d="M372 52 L372 28 L348 28" fill="none" stroke="#89E900" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Corner bracket — bottom left -->
  <path d="M28 348 L28 372 L52 372" fill="none" stroke="#89E900" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Corner bracket — bottom right -->
  <path d="M372 348 L372 372 L348 372" fill="none" stroke="#89E900" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- MR in Syne 800 (geometric sans) -->
  <text
    x="52"
    y="262"
    font-family="Syne, 'Arial Black', sans-serif"
    font-weight="800"
    font-size="168"
    fill="#89E900"
    letter-spacing="-8">MR</text>

  <!-- j in Playfair Display italic (dramatic serif) -->
  <text
    x="268"
    y="272"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="900"
    font-style="italic"
    font-size="192"
    fill="#f5f5f5"
    fill-opacity="0.92"
    letter-spacing="0">j</text>

  <!-- Separator line -->
  <line x1="52" y1="296" x2="348" y2="296" stroke="#89E900" stroke-opacity="0.18" stroke-width="0.8"/>

  <!-- Center dot on separator -->
  <circle cx="200" cy="296" r="3" fill="#89E900" fill-opacity="0.7"/>

  <!-- Name label -->
  <text x="200" y="318"
    font-family="Syne, 'Arial Black', sans-serif"
    font-weight="800"
    font-size="13"
    fill="#f5f5f5"
    fill-opacity="0.2"
    letter-spacing="5"
    text-anchor="middle">MIDHUN RAJ</text>

  <!-- Tags row -->
  <!-- learn pill -->
  <rect x="62" y="332" width="72" height="20" rx="10" fill="#89E900" fill-opacity="0.07" stroke="#89E900" stroke-opacity="0.22" stroke-width="0.8"/>
  <text x="98" y="346"
    font-family="Syne, sans-serif"
    font-weight="800"
    font-size="9"
    fill="#89E900"
    fill-opacity="0.65"
    letter-spacing="1.5"
    text-anchor="middle">LEARN</text>

  <!-- build pill -->
  <rect x="146" y="332" width="66" height="20" rx="10" fill="#89E900" fill-opacity="0.07" stroke="#89E900" stroke-opacity="0.22" stroke-width="0.8"/>
  <text x="179" y="346"
    font-family="Syne, sans-serif"
    font-weight="800"
    font-size="9"
    fill="#89E900"
    fill-opacity="0.65"
    letter-spacing="1.5"
    text-anchor="middle">BUILD</text>

  <!-- exploit pill -->
  <rect x="224" y="332" width="78" height="20" rx="10" fill="#89E900" fill-opacity="0.07" stroke="#89E900" stroke-opacity="0.22" stroke-width="0.8"/>
  <text x="263" y="346"
    font-family="Syne, sans-serif"
    font-weight="800"
    font-size="9"
    fill="#89E900"
    fill-opacity="0.65"
    letter-spacing="1.5"
    text-anchor="middle">EXPLOIT</text>

  <!-- Version dot indicators -->
  <circle cx="188" cy="372" r="3" fill="#89E900" fill-opacity="0.25"/>
  <rect x="194" y="369" width="14" height="6" rx="3" fill="#89E900" fill-opacity="0.6"/>
  <circle cx="212" cy="372" r="3" fill="#89E900" fill-opacity="0.25"/>

</svg>
